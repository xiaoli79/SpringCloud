server:
  port: 10030

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 10.219.33.221:8848
    gateway:
      routes:  # 网关路由配置
        - id: user-service  # 路由ID，自定义，唯一即可
          uri: lb://user-service  # 目标服务地址
          predicates:  # 路由条件
            - Path=/user/**

        - id: blog-service
          uri: lb://blog-service
          predicates:
            - Path=/blog/**
      globalcors:
        # 解决options请求被拦截的问题
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true