server:
  port: 10030
spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 10.219.36.99:8848
    gateway:
      metrics:
        enabled: true
      routes:
        - id: order-service  #路由规则id，随便起，不重复即可
          uri: lb://order-service/ # 目标服务地址
          predicates: # 路由条件
            - Path=/order/**,/feign/**
          filters:
#            - 为每个请求添加一个参数~~
          - AddRequestParameter=userName, bite
          - name: Custom    #过滤器名称~~
            args:
              name: test_custom
        - id: product-service
          uri: lb://product-service/
          predicates:
            - Path=/product/**
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY
#这个是用来监控信息~~
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true


